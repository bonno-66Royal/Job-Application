<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form - TechCorp</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (optional but nice) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            padding: 40px 0;
        }
        
        .form-container {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            margin: 20px auto;
            max-width: 800px;
        }
        
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-weight: 600;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        
        fieldset {
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fafafa;
            transition: all 0.3s ease;
        }
        
        fieldset:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        legend {
            color: #667eea;
            font-weight: bold;
            font-size: 1.2rem;
            width: auto;
            padding: 0 15px;
            margin-left: 15px;
            border-bottom: none;
            background-color: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            padding: 5px 20px;
        }
        
        .required-field::after {
            content: " *";
            color: red;
            font-weight: bold;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        
        .btn-reset {
            background-color: #6c757d;
            border: none;
            padding: 12px 30px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .btn-reset:hover {
            background-color: #5a6268;
        }
        
        .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }
        
        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 5px;
            display: none;
        }
        
        .is-invalid {
            border-color: #dc3545 !important;
        }
        
        .is-invalid:focus {
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25) !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1><i class="bi bi-briefcase-fill me-2"></i>Job Application Form</h1>
            
            <form name="jobApplication" onsubmit="return validateForm()" method="post">
                <!-- Personal Information Section -->
                <fieldset>
                    <legend><i class="bi bi-person-fill me-2"></i>Personal Information</legend>
                    
                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label for="fullname" class="form-label required-field">Full Name</label>
                            <input type="text" class="form-control" id="fullname" name="fullname" 
                                   placeholder="Enter your full name">
                            <div class="error-message" id="nameError">Please enter your full name</div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label required-field">Email Address</label>
                            <input type="email" class="form-control" id="email" name="email" 
                                   placeholder="@example.gmail.com">
                            <div class="error-message" id="emailError">Please enter your email address</div>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="telephone" class="form-label required-field">Telephone Number</label>
                            <input type="tel" class="form-control" id="telephone" name="telephone" 
                                   placeholder="(267) 7865-7890">
                            <div class="error-message" id="phoneError">Please enter your telephone number</div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="address" class="form-label">Physical Address</label>
                        <textarea class="form-control" id="address" name="address" rows="2" 
                                  placeholder="Enter your full address"></textarea>
                    </div>
                </fieldset>
                
                <!-- Position Information Section -->
                <fieldset>
                    <legend><i class="bi bi-briefcase me-2"></i>Position Information</legend>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="jobTitle" class="form-label">Desired Job Title</label>
                            <select class="form-select" id="jobTitle" name="jobTitle">
                                <option value="">Select a position...</option>
                                <option value="Software Engineer">Software Engineer</option>
                                <option value="Sales Representative">Sales Representative</option>
                                <option value="Marketing Specialist">Marketing Specialist</option>
                                <option value="HR Manager">HR Manager</option>
                                <option value="Product Manager">Product Manager</option>
                            </select>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label d-block">Employment Type</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="employmentType" 
                                       id="partTimeContract" value="Part-time contract">
                                <label class="form-check-label" for="partTimeContract">Part-time contract</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="employmentType" 
                                       id="partTimePermanent" value="Part-time permanent">
                                <label class="form-check-label" for="partTimePermanent">Part-time permanent</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="employmentType" 
                                       id="fullTimeContract" value="Full-time contract">
                                <label class="form-check-label" for="fullTimeContract">Full-time contract</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="employmentType" 
                                       id="fullTimePermanent" value="Full-time permanent">
                                <label class="form-check-label" for="fullTimePermanent">Full-time permanent</label>
                            </div>
                        </div>
                    </div>
                </fieldset>
                
                <!-- Areas of Interest Section -->
                <fieldset>
                    <legend><i class="bi bi-star-fill me-2"></i>Area(s) of Interest</legend>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="interest" 
                                       id="accountExecutive" value="Account Executive">
                                <label class="form-check-label" for="accountExecutive">Account Executive</label>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="interest" 
                                       id="businessDevelopment" value="Business Development">
                                <label class="form-check-label" for="businessDevelopment">Business Development</label>
                            </div>
                        </div>
